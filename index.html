<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光污染观星地图 ✦ Dark Sky Map</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0a12; font-family:"PingFang SC","Microsoft YaHei",sans-serif; color:#c8c8d4; }
  #map { width:100%; height:100%; }
  #loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(10,10,20,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:24px 36px; z-index:999; text-align:center; transition:opacity 0.4s; }
  #loading.hidden { opacity:0; pointer-events:none; }
  .spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,0.1); border-top-color:#4a90d9; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 10px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #status { position:absolute; top:16px; left:16px; z-index:100; background:rgba(10,10,20,0.92); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px 18px; max-width:300px; backdrop-filter:blur(14px); }
  #status h1 { font-size:18px; color:#fff; }
  #status .info { font-size:12px; color:#7a7a8c; margin-top:4px; }
  #legend { position:absolute; bottom:32px; right:16px; z-index:100; background:rgba(10,10,20,0.92); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:14px 16px; min-width:175px; backdrop-filter:blur(14px); }
  #legend h3 { font-size:13px; color:#fff; margin-bottom:10px; }
  .legend-item { display:flex; align-items:center; gap:8px; margin-bottom:5px; font-size:11px; color:#7a7a8c; }
  .legend-swatch { width:24px; height:12px; border-radius:3px; flex-shrink:0; }
  .ctrl { position:absolute; top:16px; right:16px; z-index:100; display:flex; flex-direction:column; gap:8px; }
  .ctrl button { width:42px; height:42px; border-radius:10px; background:rgba(10,10,20,0.92); border:1px solid rgba(255,255,255,0.08); color:#fff; font-size:18px; cursor:pointer; backdrop-filter:blur(14px); transition:all 0.2s; }
  .ctrl button:hover { background:rgba(255,255,255,0.12); }
  .ctrl button.active { background:#4a90d9; }
  .bortle-badge { padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; color:#fff; white-space:nowrap; }
  @media (max-width:640px) {
    #status { top:8px; left:8px; right:60px; max-width:none; padding:10px 14px; }
    #status h1 { font-size:15px; }
    #legend { bottom:62px; right:8px; padding:10px 12px; min-width:145px; }
    .ctrl { top:8px; right:8px; gap:6px; }
    .ctrl button { width:36px; height:36px; font-size:16px; }
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="loading"><div class="spinner"></div><div style="font-size:13px;color:#7a7a8c">正在加载星图...</div></div>

<div id="status">
  <h1>🌌 光污染观星地图</h1>
  <div class="info">NASA VIIRS 卫星数据</div>
  <div class="info" id="status-text" style="color:#4ec94e;margin-top:6px;">初始化中...</div>
</div>

<div class="ctrl">
  <button class="active" id="btn-layer" title="光污染图层">🌙</button>
  <button id="btn-locate" title="定位">📍</button>
</div>

<div id="legend">
  <h3>🌃 Bortle 等级</h3>
  <div class="legend-item"><span class="legend-swatch" style="background:#010a1a;border:1px solid #1a2a4a"></span>1级·绝佳暗夜</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#0a1a4a"></span>2级·典型暗夜</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#1a3a6a"></span>3级·乡村天空</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#1a6a3a"></span>4级·郊野过渡</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#8aaa1a"></span>5级·郊区天空</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#daa000"></span>6级·明亮郊区</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#da4a00"></span>7级·城郊过渡</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#b0b0c0"></span>8级·城市天空</div>
  <div class="legend-item"><span class="legend-swatch" style="background:#f0f0f0;border:1px solid #ccc"></span>9级·内城天空</div>
</div>

<div id="mobile-bar" style="display:none;position:absolute;bottom:0;left:0;right:0;background:rgba(10,10,20,0.92);border-top:1px solid rgba(255,255,255,0.08);padding:10px 16px;z-index:100;">
  <div style="display:flex;align-items:center;gap:12px;">
    <div style="flex:1;"><div style="color:#fff;font-weight:600" id="mob-loc">—</div><div style="color:#7a7a8c;font-size:10px" id="mob-coords"></div></div>
    <div class="bortle-badge" id="mob-bortle" style="background:#555">—</div>
  </div>
</div>

<script>
  window._AMapSecurityConfig = { securityJsCode: '6b11a45456ab152ef39d6102bf17c64b' };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=7fa2938b063c0fa7ca09c840ead945cf&plugin=AMap.Geolocation,AMap.Scale,AMap.ToolBar"></script>

<script>
(function() {

  const CITY_VIIRS = [

    { name:'广州',lng:113.26,lat:23.13,rad:52 }, { name:'深圳',lng:114.06,lat:22.55,rad:50 },
    { name:'重庆',lng:106.55,lat:29.56,rad:38 }, { name:'天津',lng:117.19,lat:39.13,rad:42 },
    { name:'成都',lng:104.07,lat:30.57,rad:35 }, { name:'武汉',lng:114.30,lat:30.60,rad:32 },
    { name:'杭州',lng:120.16,lat:30.27,rad:38 }, { name:'南京',lng:118.78,lat:32.06,rad:36 },
    { name:'郑州',lng:113.63,lat:34.75,rad:30 }, { name:'长沙',lng:112.97,lat:28.23,rad:28 },
    { name:'西安',lng:108.94,lat:34.26,rad:32 }, { name:'济南',lng:117.00,lat:36.67,rad:28 },
    { name:'青岛',lng:120.38,lat:36.07,rad:22 }, { name:'大连',lng:121.62,lat:38.92,rad:20 },
    { name:'厦门',lng:118.09,lat:24.48,rad:24 }, { name:'福州',lng:119.30,lat:26.08,rad:26 },
    { name:'合肥',lng:117.23,lat:31.82,rad:24 }, { name:'南昌',lng:115.86,lat:28.68,rad:22 },
    { name:'沈阳',lng:123.43,lat:41.80,rad:28 }, { name:'长春',lng:125.32,lat:43.90,rad:20 },
    { name:'哈尔滨',lng:126.64,lat:45.75,rad:22 }, { name:'石家庄',lng:114.50,lat:38.04,rad:24 },

    { name:'兰州',lng:103.82,lat:36.06,rad:12 }, { name:'西宁',lng:101.78,lat:36.62,rad:6 },

    { name:'昆明',lng:102.83,lat:24.88,rad:14 }, { name:'南宁',lng:108.37,lat:22.82,rad:18 },
    { name:'海口',lng:110.35,lat:20.02,rad:14 }, { name:'乌鲁木齐',lng:87.62,lat:43.83,rad:14 },
    { name:'拉萨',lng:91.17,lat:29.65,rad:2 }, { name:'苏州',lng:120.59,lat:31.30,rad:28 },
    { name:'东莞',lng:113.75,lat:23.05,rad:32 }, { name:'宁波',lng:121.54,lat:29.87,rad:22 },
    { name:'无锡',lng:120.31,lat:31.57,rad:26 }, { name:'常州',lng:119.97,lat:31.81,rad:22 },
    { name:'温州',lng:120.70,lat:28.00,rad:16 }, { name:'绍兴',lng:120.58,lat:30.05,rad:16 },

    { name:'中山',lng:113.38,lat:22.52,rad:20 }, { name:'惠州',lng:114.42,lat:23.11,rad:14 },
    { name:'唐山',lng:118.18,lat:39.63,rad:14 }, { name:'徐州',lng:117.18,lat:34.27,rad:10 },
    { name:'洛阳',lng:112.45,lat:34.68,rad:8 }, { name:'芜湖',lng:118.43,lat:31.35,rad:8 },
    { name:'宜昌',lng:111.29,lat:30.69,rad:4 }, { name:'襄阳',lng:112.15,lat:32.04,rad:5 },
    { name:'岳阳',lng:113.11,lat:29.37,rad:4 }, { name:'桂林',lng:110.29,lat:25.28,rad:5 },
    { name:'三亚',lng:109.51,lat:18.25,rad:3 }, { name:'包头',lng:109.84,lat:40.66,rad:6 },
    { name:'齐齐哈尔',lng:123.92,lat:47.35,rad:3 }, { name:'大庆',lng:125.03,lat:46.59,rad:4 },
    { name:'佳木斯',lng:130.32,lat:46.80,rad:1.5 }, { name:'酒泉',lng:98.52,lat:39.74,rad:1 },
    { name:'喀什',lng:75.99,lat:39.47,rad:1.5 }, { name:'伊宁',lng:81.32,lat:43.92,rad:1.5 },
    { name:'格尔木',lng:94.90,lat:36.42,rad:0.5 }, { name:'那曲',lng:92.07,lat:31.48,rad:0.15 },
    { name:'阿里',lng:80.10,lat:32.50,rad:0.08 }, { name:'林芝',lng:94.36,lat:29.65,rad:0.2 },
    { name:'日喀则',lng:88.89,lat:29.27,rad:0.4 }, { name:'稻城',lng:100.30,lat:29.04,rad:0.1 },
    { name:'甘孜',lng:99.99,lat:31.62,rad:0.25 }, { name:'阿坝',lng:101.71,lat:31.90,rad:0.3 },
    { name:'丽江',lng:100.23,lat:26.86,rad:1 }, { name:'大理',lng:100.23,lat:25.61,rad:1.5 },
    { name:'香格里拉',lng:99.70,lat:27.83,rad:0.3 }, { name:'漠河',lng:122.53,lat:53.48,rad:0.4 },
    { name:'呼伦贝尔',lng:119.77,lat:49.21,rad:0.5 }, { name:'锡林浩特',lng:116.09,lat:43.93,rad:0.6 },
    { name:'可可西里',lng:91.50,lat:35.30,rad:0.05 }, { name:'阿尔山',lng:119.94,lat:47.18,rad:0.2 },
    { name:'德令哈',lng:97.37,lat:37.37,rad:0.3 }, { name:'玉树',lng:97.01,lat:33.00,rad:0.2 },
    { name:'阿克苏',lng:80.26,lat:41.17,rad:1.2 }, { name:'吐鲁番',lng:89.19,lat:42.95,rad:1 },
    { name:'哈密',lng:93.51,lat:42.83,rad:0.8 }, { name:'嘉峪关',lng:98.29,lat:39.77,rad:1.2 },
    { name:'天水',lng:105.72,lat:34.58,rad:2 },
  ];

  const BORTLE_TABLE = [
    { max:0.15,level:1,label:'绝佳暗夜',color:'#010a1a',desc:'极暗 — 银河清晰，深空摄影绝佳' },
    { max:0.30,level:2,label:'典型暗夜',color:'#0a1a4a',desc:'很暗 — 银河可见，深空天体丰富' },
    { max:0.60,level:3,label:'乡村天空',color:'#1a3a6a',desc:'暗 — 银河可见，适合观星' },
    { max:1.20,level:4,label:'郊野过渡',color:'#1a6a3a',desc:'较暗 — 银河隐约，亮星清晰' },
    { max:2.50,level:5,label:'郊区天空',color:'#8aaa1a',desc:'偏亮 — 银河不可见' },
    { max:8.00,level:6,label:'明亮郊区',color:'#daa000',desc:'亮 — 仅亮星可见' },
    { max:20.0,level:7,label:'城郊过渡',color:'#da4a00',desc:'很亮 — 仅行星可见' },
    { max:50.0,level:8,label:'城市天空',color:'#b0b0c0',desc:'非常亮 — 仅月亮可见' },
    { max:Infinity,level:9,label:'内城天空',color:'#f0f0f0',desc:'极亮 — 不适合观星' },
  ];

  function radianceToBortle(rad) {
    for (var m of BORTLE_TABLE) { if (rad < m.max) return [m.level,m.label,m.color,m.desc]; }
    return [9,'内城天空','#f0f0f0','极亮'];
  }

  function haversineDist(lng1, lat1, lng2, lat2) {
    var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    var a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  function estimateBortle(lng, lat) {
    var totalW = 0, weightedR = 0, closestD = Infinity, closestCity = null;
    for (var i=0; i<CITY_VIIRS.length; i++) {
      var c = CITY_VIIRS[i], d = haversineDist(lng, lat, c.lng, c.lat);
      if (d < closestD) { closestD = d; closestCity = c; }
      var w = Math.exp(-d/80)*c.rad;
      weightedR += w; totalW += Math.exp(-d/80);
    }
    var radiance = closestD < 5 ? closestCity.rad : (totalW>0 ? weightedR/totalW : 0.2);
    return radianceToBortle(radiance);
  }

  function getBortle(lng, lat, cb) {
    setTimeout(function() { cb(estimateBortle(lng,lat)); }, 0);
  }

  // ---- DOM ----
  var loadingEl = document.getElementById('loading');
  var statusText = document.getElementById('status-text');
  var btnLayer = document.getElementById('btn-layer');
  var btnLocate = document.getElementById('btn-locate');
  var mobLoc = document.getElementById('mob-loc');
  var mobCoords = document.getElementById('mob-coords');
  var mobBortle = document.getElementById('mob-bortle');

  // ---- Map Init ----
  var map = new AMap.Map('map', {
    zoom: 5,
    center: [104.0, 36.5],
    viewMode: '2D',
    mapStyle: 'amap://styles/dark'
  });

  map.addControl(new AMap.Scale());
  map.addControl(new AMap.ToolBar({
    position: { right:'16px', bottom:'160px' }, liteStyle:true
  }));

  // ---- 光污染图层已移除，用干净的高德暗色底图 ----
  // Bortle 等级通过点击/定位时基于本地城市数据计算显示
  var lightLayerVisible = true;
  var lightLayer = null; // 占位，保持兼容
  statusText.textContent = '✅ 地图已就绪，点击地图查看光污染等级...';

  // ---- Geolocation ----
  var geolocation, userMarker, userInfoWin, clickMarker, clickInfoWin;

  AMap.plugin('AMap.Geolocation', function() {
    geolocation = new AMap.Geolocation({
      enableHighAccuracy:true, timeout:10000,
      buttonPosition:'RB', buttonOffset:new AMap.Pixel(12,16),
      zoomToAccuracy:true, showCircle:true, panToLocation:true
    });
    map.addControl(geolocation);
    doLocate();
  });

  function doLocate() {
    if (!geolocation) return;
    btnLocate.style.opacity='0.5';
    geolocation.getCurrentPosition(function(status, result) {
      btnLocate.style.opacity='1';
      if (status === 'complete') {
        var lng = result.position.lng, lat = result.position.lat;
        var addr = result.formattedAddress || '';
        if (userMarker) { map.remove(userMarker); userMarker=null; }
        if (userInfoWin) { map.remove(userInfoWin); userInfoWin=null; }

        userMarker = new AMap.Marker({
          position:[lng,lat],
          icon: new AMap.Icon({ size:new AMap.Size(28,42), image:'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png', imageSize:new AMap.Size(28,42), imageOffset:new AMap.Pixel(0,0) }),
          anchor:'bottom-center', zIndex:110
        });
        map.add(userMarker);

        getBortle(lng, lat, function(bortle) {
          var level=bortle[0],label=bortle[1],color=bortle[2],desc=bortle[3];
          userInfoWin = new AMap.InfoWindow({
            content: '<div style="color:#ccc;line-height:1.9;font-size:13px;"><div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">📍 你的位置</div><div>'+addr+'</div><div style="margin-top:6px;"><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:'+color+';vertical-align:middle;margin-right:6px;"></span><strong>Bortle '+level+' 级 · '+label+'</strong></div><div style="font-size:11px;color:#999;margin-top:2px;">'+desc+'</div></div>',
            offset:new AMap.Pixel(0,-48), isCustom:true
          });
          userInfoWin.open(map,[lng,lat]);
          updateUI(lng, lat, addr, bortle);
        });
      } else {
        statusText.textContent = '⚠️ 定位失败，可手动拖动地图';
        mobLoc.textContent = '定位失败';
        AMap.plugin('AMap.CitySearch', function() {
          new AMap.CitySearch().getLocalCity(function(cs, r) {
            if (cs==='complete' && r.info==='OK') { statusText.textContent='📍 '+r.city; mobLoc.textContent=r.city; }
          });
        });
      }
    });
  }

  function updateUI(lng, lat, addr, bortle) {
    var level=bortle[0],label=bortle[1],color=bortle[2];
    statusText.textContent = '📍 '+(addr||'');
    mobLoc.textContent = label+' · '+(addr||'当前位置');
    mobCoords.textContent = lng.toFixed(4)+', '+lat.toFixed(4);
    mobBortle.textContent = 'Bortle '+level;
    mobBortle.style.background = color;
    mobBortle.style.color = level<=2?'#aaccff':'#fff';
  }

  // ---- Map click ----
  map.on('click', function(e) {
    var lng = e.lnglat.lng, lat = e.lnglat.lat;
    AMap.plugin('AMap.Geocoder', function() {
      new AMap.Geocoder({}).getAddress([lng,lat], function(gs, gr) {
        var addr = (gs==='complete' && gr.regeocode) ? gr.regeocode.formattedAddress : lng.toFixed(4)+', '+lat.toFixed(4);
        if (clickMarker) { map.remove(clickMarker); clickMarker=null; }
        if (clickInfoWin) { map.remove(clickInfoWin); clickInfoWin=null; }
        clickMarker = new AMap.Marker({
          position:[lng,lat],
          icon: new AMap.Icon({ size:new AMap.Size(28,42), image:'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png', imageSize:new AMap.Size(28,42), imageOffset:new AMap.Pixel(0,0) }),
          anchor:'bottom-center', zIndex:110
        });
        map.add(clickMarker);

        getBortle(lng, lat, function(bortle) {
          var level=bortle[0],label=bortle[1],color=bortle[2],desc=bortle[3];
          clickInfoWin = new AMap.InfoWindow({
            content: '<div style="color:#ccc;line-height:1.9;font-size:13px;max-width:260px;"><div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">📍 标记点</div><div style="font-size:11px;color:#999;">'+addr+'</div><div style="margin-top:6px;font-size:12px;color:#888;">坐标: '+lng.toFixed(4)+', '+lat.toFixed(4)+'</div><div style="margin-top:6px;"><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:'+color+';vertical-align:middle;margin-right:6px;"></span><strong>Bortle '+level+' 级 · '+label+'</strong></div><div style="font-size:11px;color:#999;margin-top:2px;">'+desc+'</div></div>',
            offset:new AMap.Pixel(0,-46), isCustom:true
          });
          clickInfoWin.open(map,[lng,lat]);
          updateUI(lng, lat, addr, bortle);
        });
      });
    });
  });

  // ---- Controls ----
  btnLayer.addEventListener('click', function() {
    if (lightLayerVisible) {
      lightLayerVisible = false;
      btnLayer.classList.remove('active');
      alert('光污染热力图已移除，现在使用干净的底图。\n点击地图任意位置可查看该地点的 Bortle 等级。');
    } else {
      lightLayerVisible = true;
      btnLayer.classList.add('active');
      alert('当前使用干净底图模式，点击地图查看光污染等级。');
    }
    lightLayerVisible = !lightLayerVisible;
  });

  btnLocate.addEventListener('click', doLocate);

  // ---- Mobile responsive ----
  if (window.innerWidth <= 640) {
    document.getElementById('mobile-bar').style.display = 'block';
  }
})();
</script>

</body>
</html>
