<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中国光污染观星地图 ✦ Dark Sky Map</title>
<style>
  :root {
    --bg: #0a0a12;
    --panel-bg: rgba(10, 10, 20, 0.92);
    --text: #c8c8d4;
    --text-dim: #7a7a8c;
    --accent: #4a90d9;
    --accent2: #e8a840;
    --border: rgba(255, 255, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
  }

  #map-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

  /* ===== Panel base ===== */
  .panel {
    background: var(--panel-bg);
    backdrop-filter: blur(14px) saturate(1.2);
    -webkit-backdrop-filter: blur(14px) saturate(1.2);
    border: 1px solid var(--border);
    border-radius: 12px;
    pointer-events: auto;
  }

  /* ===== Header ===== */
  #header {
    position: absolute; top: 16px; left: 16px;
    z-index: 100; max-width: 340px;
    padding: 14px 18px;
  }
  #header h1 {
    font-size: 18px; font-weight: 700;
    color: #fff; display: flex; align-items: center; gap: 8px;
  }
  #header h1 .icon { font-size: 22px; }
  #header .subtitle { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  #header .status-row {
    display: flex; align-items: center; gap: 6px;
    margin-top: 8px; font-size: 12px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #555; flex-shrink: 0;
    transition: background 0.3s;
  }
  .status-dot.located { background: #4ec94e; }
  .status-dot.error { background: #e04a4a; }

  /* ===== Search ===== */
  #search-box {
    position: absolute; top: 120px; left: 16px;
    z-index: 100; width: 300px;
    pointer-events: auto;
  }
  #search-box .search-inner {
    display: flex; align-items: center;
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  #search-box .search-inner:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  #search-box input {
    flex: 1;
    background: none; border: none; outline: none;
    color: #fff; font-size: 14px;
    padding: 11px 14px;
    font-family: inherit;
    min-width: 0;
  }
  #search-box input::placeholder { color: var(--text-dim); }
  #search-box .search-icon, #search-box .search-clear {
    flex-shrink: 0; width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-dim);
    font-size: 16px; transition: color 0.2s;
    background: none; border: none;
  }
  #search-box .search-icon:hover, #search-box .search-clear:hover { color: #fff; }
  #search-box .search-clear { display: none; }
  #search-box .search-clear.visible { display: flex; }

  /* AutoComplete suggestions dropdown */
  .amap-sug-result {
    background: var(--panel-bg) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border) !important;
    border-radius: 0 0 12px 12px !important;
    margin-top: -1px !important;
    overflow: hidden !important;
  }
  .amap-sug-result .auto-list-item {
    color: var(--text) !important;
    padding: 10px 14px !important;
    font-size: 13px !important;
    border-bottom: 1px solid var(--border) !important;
    cursor: pointer !important;
  }
  .amap-sug-result .auto-list-item:hover,
  .amap-sug-result .auto-list-item.hover {
    background: rgba(255,255,255,0.08) !important;
    color: #fff !important;
  }

  /* ===== Controls ===== */
  #controls {
    position: absolute; top: 16px; right: 16px;
    z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
  }
  .ctrl-btn {
    width: 42px; height: 42px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
  }
  .ctrl-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
  .ctrl-btn.active { background: var(--accent); border-color: rgba(74,144,217,0.6); box-shadow: 0 0 12px rgba(74,144,217,0.25); }
  .ctrl-btn .tooltip {
    position: absolute; right: 54px;
    background: rgba(0,0,0,0.88); color: #ccc;
    font-size: 11px; padding: 5px 10px; border-radius: 6px;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.2s;
  }
  .ctrl-btn:hover .tooltip { opacity: 1; }

  /* ===== Legend ===== */
  #legend {
    position: absolute; bottom: 32px; right: 16px;
    z-index: 100; min-width: 175px;
    padding: 14px 16px;
  }
  #legend h3 { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: #fff; }
  .scale-item {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 5px; font-size: 11px; color: var(--text-dim);
  }
  .swatch { width: 24px; height: 12px; border-radius: 3px; flex-shrink: 0; }
  .swatch.b1 { background: #010a1a; border: 1px solid #1a2a4a; }
  .swatch.b2 { background: #0a1a4a; }
  .swatch.b3 { background: #1a3a6a; }
  .swatch.b4 { background: #1a6a3a; }
  .swatch.b5 { background: #8aaa1a; }
  .swatch.b6 { background: #daa000; }
  .swatch.b7 { background: #da4a00; }
  .swatch.b8 { background: #b0b0c0; }
  .swatch.b9 { background: #f0f0f0; border: 1px solid #ccc; }
  .scale-label { flex: 1; white-space: nowrap; }

  /* ===== Map click info ===== */
  .amap-info-content {
    background: var(--panel-bg) !important;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--border) !important;
    border-radius: 12px !important;
    color: var(--text) !important;
    padding: 12px 16px !important;
    font-size: 13px; line-height: 1.8;
  }
  .amap-info-sharp {
    border-top-color: var(--panel-bg) !important;
  }

  /* ===== Mobile bar ===== */
  #mobile-bar {
    display: none;
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--panel-bg);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    z-index: 100; pointer-events: auto;
  }
  #mobile-bar .bar-inner { display: flex; align-items: center; gap: 12px; }
  #mobile-bar .loc-info { flex: 1; font-size: 12px; }
  .bortle-badge {
    padding: 5px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700; color: #fff;
    white-space: nowrap;
  }

  /* ===== Loading ===== */
  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: var(--panel-bg);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 24px 36px;
    z-index: 200; text-align: center;
    transition: opacity 0.4s;
  }
  #loading.done { opacity: 0; pointer-events: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    #header {
      top: 8px; left: 8px; right: 60px;
      max-width: none; padding: 10px 14px; border-radius: 10px;
    }
    #header h1 { font-size: 15px; }
    #header .subtitle { font-size: 11px; }
    #legend {
      bottom: 62px; right: 8px;
      padding: 10px 12px; min-width: 145px; border-radius: 10px;
    }
    .scale-item { font-size: 10px; margin-bottom: 3px; }
    .swatch { width: 18px; height: 10px; }
    #controls { top: 8px; right: 8px; gap: 6px; }
    .ctrl-btn { width: 36px; height: 36px; font-size: 16px; border-radius: 8px; }
    #mobile-bar { display: block; }
    #search-box { top: 88px; left: 8px; right: 8px; width: auto; }
  }
</style>
</head>
<body>

<div id="map-container"></div>

<!-- Loading -->
<div id="loading"><div class="spinner"></div><div style="font-size:13px;color:var(--text-dim)">正在加载星图...</div></div>

<!-- Header -->
<div id="header" class="panel">
  <h1><span class="icon">🌌</span>光污染观星地图</h1>
  <div class="subtitle">NASA VIIRS 夜间卫星数据 &nbsp;·&nbsp; 高德底图</div>
  <div class="status-row">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">初始化中...</span>
  </div>
</div>

<!-- Search -->
<div id="search-box">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="搜索地点，查看光污染等级..." autocomplete="off">
    <button class="search-clear" id="search-clear" title="清除">✕</button>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn active" id="btn-layer">🌙<span class="tooltip">光污染图层 (L)</span></button>
  <button class="ctrl-btn" id="btn-locate">📍<span class="tooltip">定位到我 (F)</span></button>
  <button class="ctrl-btn" id="btn-fullscreen">⛶<span class="tooltip">全屏</span></button>
</div>

<!-- Bortle Legend -->
<div id="legend" class="panel">
  <h3>🌃 Bortle 光污染等级</h3>
  <div class="scale-item"><span class="swatch b1"></span><span class="scale-label">1 级&nbsp;·&nbsp;绝佳暗夜</span></div>
  <div class="scale-item"><span class="swatch b2"></span><span class="scale-label">2 级&nbsp;·&nbsp;典型暗夜</span></div>
  <div class="scale-item"><span class="swatch b3"></span><span class="scale-label">3 级&nbsp;·&nbsp;乡村天空</span></div>
  <div class="scale-item"><span class="swatch b4"></span><span class="scale-label">4 级&nbsp;·&nbsp;郊野过渡</span></div>
  <div class="scale-item"><span class="swatch b5"></span><span class="scale-label">5 级&nbsp;·&nbsp;郊区天空</span></div>
  <div class="scale-item"><span class="swatch b6"></span><span class="scale-label">6 级&nbsp;·&nbsp;明亮郊区</span></div>
  <div class="scale-item"><span class="swatch b7"></span><span class="scale-label">7 级&nbsp;·&nbsp;城郊过渡</span></div>
  <div class="scale-item"><span class="swatch b8"></span><span class="scale-label">8 级&nbsp;·&nbsp;城市天空</span></div>
  <div class="scale-item"><span class="swatch b9"></span><span class="scale-label">9 级&nbsp;·&nbsp;内城天空</span></div>
</div>

<!-- Mobile bar -->
<div id="mobile-bar">
  <div class="bar-inner">
    <div class="loc-info">
      <div style="color:#fff;font-weight:600" id="mob-loc">—</div>
      <div style="color:var(--text-dim);font-size:10px" id="mob-coords"></div>
    </div>
    <div class="bortle-badge" id="mob-bortle" style="background:#555">—</div>
  </div>
</div>

</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=7fa2938b063c0fa7ca09c840ead945cf&plugin=AMap.Geolocation,AMap.Scale,AMap.ToolBar,AMap.AutoComplete,AMap.PlaceSearch"></script>

<script>
(function() {
  'use strict';

  // ── DOM refs ──────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const statusDot = $('status-dot');
  const statusText = $('status-text');
  const loadingEl = $('loading');
  const btnLayer = $('btn-layer');
  const btnLocate = $('btn-locate');
  const btnFullscreen = $('btn-fullscreen');
  const mobLoc = $('mob-loc');
  const mobCoords = $('mob-coords');
  const mobBortle = $('mob-bortle');
  const searchInput = $('search-input');
  const searchClear = $('search-clear');

  // ── State ─────────────────────────────────────────────────
  let map, geolocation, lightLayer, userMarker, userInfoWin, searchMarker, searchInfoWin, clickMarker, clickInfoWin;
  let layerVisible = true;
  let currentBortle = null;
  let autoComplete = null;
  let placeSearch = null;

  // ── Bortle 等级估算 ─────────────────────────────────────
  // 基于中国地理区域的大致估算，精确数据请看地图上的 NASA 图层
  function estimateBortle(lng, lat) {
    // 青藏高原核心区
    if (lat > 28 && lat < 36 && lng > 78 && lng < 98)
      return [1, '绝佳暗夜', '#010a1a', '青藏高原核心 — 中国最佳观星地'];
    // 新疆
    if (lat > 35 && lat < 48 && lng > 75 && lng < 95)
      return [1, '绝佳暗夜', '#010a1a', '新疆腹地 — 干燥少云，极佳透明度'];
    // 青海
    if (lat > 32 && lat < 39 && lng > 90 && lng < 103)
      return [1, '绝佳暗夜', '#010a1a', '青海 — 高海拔，空气稀薄'];
    // 川西高原
    if (lat > 28 && lat < 34 && lng > 98 && lng < 104)
      return [2, '典型暗夜', '#0a1a4a', '川西高原 — 贡嘎、稻城观星圣地'];
    // 云南山区
    if (lat > 22 && lat < 29 && lng > 98 && lng < 105)
      return [2, '典型暗夜', '#0a1a4a', '云南山区 — 低纬度高海拔'];
    // 内蒙古草原
    if (lat > 40 && lat < 50 && lng > 110 && lng < 122)
      return [2, '典型暗夜', '#0a1a4a', '内蒙古草原 — 开阔无光害'];
    // 甘肃宁夏
    if (lat > 34 && lat < 42 && lng > 93 && lng < 108)
      return [2, '典型暗夜', '#0a1a4a', '甘肃宁夏 — 干旱少云'];
    // 黑龙江北部
    if (lat > 47 && lat < 54 && lng > 120 && lng < 135)
      return [2, '典型暗夜', '#0a1a4a', '黑龙江北部 — 冬季星空璀璨'];
    // 西部乡村
    if (lng < 106 && lat > 25)
      return [3, '乡村天空', '#1a3a6a', '西部乡村 — 适合星空观测'];
    // 中部郊野
    if (lng >= 106 && lng < 115 && lat > 25)
      return [4, '郊野过渡', '#1a6a3a', '中部地区 — 银河隐约可见'];
    // 东北
    if (lng >= 115 && lat > 40)
      return [4, '郊野过渡', '#1a6a3a', '东北地区 — 部分区域尚可'];
    // 东部地区 (京津冀、长三角、珠三角等)
    return [5, '郊区天空', '#8aaa1a', '东部人口密集区 — 建议向西寻找暗夜'];
  }

  // ── 更新 UI ──────────────────────────────────────────────
  function updateUI(lng, lat, address) {
    const [level, label, color, desc] = estimateBortle(lng, lat);
    currentBortle = { level, label, color, desc };

    statusDot.className = 'status-dot located';
    statusText.textContent = '📍 ' + (address || label + ' · ' + lng.toFixed(2) + ', ' + lat.toFixed(2));

    mobLoc.textContent = label + ' · ' + (address || '当前位置');
    mobCoords.textContent = lng.toFixed(4) + ', ' + lat.toFixed(4);
    mobBortle.textContent = 'Bortle ' + level;
    mobBortle.style.background = color;
    mobBortle.style.color = level <= 2 ? '#aaccff' : '#fff';
  }

  // ── 光污染瓦片图层 ─────────────────────────────────────
  function createLightLayer() {
    // 方案 A: NASA GIBS Black Marble (免费，全球覆盖)
    // GoogleMapsCompatible_Level8 = XYZ 瓦片方案 (Y=0 在顶部)
    const tileLayer = new AMap.TileLayer({
      getTileUrl: function(x, y, z) {
        if (z < 3 || z > 8) return '';
        // GIBS "GoogleMapsCompatible" 已使用 XYZ 方案 (Y=0 在顶部)
        // 与高德地图的瓦片编号一致，无需翻转
        return 'https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/'
             + 'VIIRS_Black_Marble/default/default/'
             + 'GoogleMapsCompatible_Level8/'
             + z + '/' + y + '/' + x + '.png';
      },
      zIndex: 10,
      opacity: 0.72,
      zooms: [3, 8]
    });

    // 备选数据源（不需要 API Key，国内访问可能更快）：
    // const tileLayer = new AMap.TileLayer({
    //   getTileUrl: function(x, y, z) {
    //     return 'https://www.darkmap.cn/tiles/tile_' + z + '_' + x + '_' + y + '.png';
    //   },
    //   zIndex: 10, opacity: 0.7, zooms: [0, 7]
    // });

    return tileLayer;
  }

  // ── 初始化地图 ──────────────────────────────────────────
  function initMap() {
    map = new AMap.Map('map-container', {
      zoom: 5,
      center: [104.0, 36.5],     // 中国地理中心 (兰州附近)
      viewMode: '2D',
      mapStyle: 'amap://styles/dark',  // 暗色主题
      features: ['bg', 'road', 'building', 'point']
    });

    // 比例尺
    map.addControl(new AMap.Scale());

    // 缩放控件
    map.addControl(new AMap.ToolBar({
      position: { right: '16px', bottom: '160px' },
      liteStyle: true
    }));

    // 光污染图层
    lightLayer = createLightLayer();
    lightLayer.setMap(map);

    // 隐藏加载动画
    setTimeout(() => loadingEl.classList.add('done'), 1000);

    // 初始化搜索
    initSearch();

    // ══════ 地图点击：放置标记并显示光污染等级 ══════
    map.on('click', function(e) {
      const lng = e.lnglat.lng;
      const lat = e.lnglat.lat;

      // 逆地理编码获取地址
      AMap.plugin('AMap.Geocoder', function() {
        const geocoder = new AMap.Geocoder({});
        geocoder.getAddress([lng, lat], function(geoStatus, geoResult) {
          const address = (geoStatus === 'complete' && geoResult.regeocode)
            ? geoResult.regeocode.formattedAddress
            : lng.toFixed(4) + ', ' + lat.toFixed(4);

          // 移除旧点击标记
          if (clickMarker) { map.remove(clickMarker); clickMarker = null; }
          if (clickInfoWin) { map.remove(clickInfoWin); clickInfoWin = null; }

          // 新标记
          clickMarker = new AMap.Marker({
            position: [lng, lat],
            icon: new AMap.Icon({
              size: new AMap.Size(28, 42),
              image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
              imageSize: new AMap.Size(28, 42),
              imageOffset: new AMap.Pixel(0, 0)
            }),
            anchor: 'bottom-center',
            zIndex: 110
          });
          map.add(clickMarker);

          // Bortle
          const [level, label, color, desc] = estimateBortle(lng, lat);

          clickInfoWin = new AMap.InfoWindow({
            content:
              '<div style="color:#ccc;line-height:1.9;max-width:260px;">'
              + '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">📍 标记点</div>'
              + '<div style="font-size:11px;color:#999;">' + address + '</div>'
              + '<div style="margin-top:6px;font-size:12px;color:#888;">坐标: ' + lng.toFixed(4) + ', ' + lat.toFixed(4) + '</div>'
              + '<div style="margin-top:6px;">'
              +   '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;'
              +     'background:' + color + ';vertical-align:middle;margin-right:6px;"></span>'
              +   '<strong>Bortle ' + level + ' 级 · ' + label + '</strong>'
              + '</div>'
              + '<div style="font-size:11px;color:#999;margin-top:2px;">' + desc + '</div>'
              + '<div style="font-size:10px;color:#666;margin-top:4px;">点击其他地方可重新放置标记</div>'
              + '</div>',
            offset: new AMap.Pixel(0, -46),
            isCustom: true
          });
          clickInfoWin.open(map, [lng, lat]);

          // 更新状态栏
          statusText.textContent = '📍 ' + address;
          mobLoc.textContent = label + ' · 标记点';
          mobCoords.textContent = lng.toFixed(4) + ', ' + lat.toFixed(4);
          mobBortle.textContent = 'Bortle ' + level;
          mobBortle.style.background = color;
          mobBortle.style.color = level <= 2 ? '#aaccff' : '#fff';
        });
      });
    });

    // ══════ 定位 ══════
    AMap.plugin('AMap.Geolocation', function() {
      geolocation = new AMap.Geolocation({
        enableHighAccuracy: true,
        timeout: 10000,
        buttonPosition: 'RB',
        buttonOffset: new AMap.Pixel(12, 16),
        zoomToAccuracy: true,
        showCircle: true,
        panToLocation: true
      });
      map.addControl(geolocation);

      // 自动定位
      doLocate(false);
    });
  }

  // ── 定位 ────────────────────────────────────────────────
  function doLocate(silent) {
    if (!geolocation) return;

    btnLocate.style.opacity = '0.5';
    statusText.textContent = '正在定位...';

    geolocation.getCurrentPosition(function(status, result) {
      btnLocate.style.opacity = '1';

      if (status === 'complete') {
        const { lng, lat } = result.position;
        const address = result.formattedAddress || '';

        // 移除旧标记
        if (userMarker) { map.remove(userMarker); userMarker = null; }
        if (userInfoWin) { map.remove(userInfoWin); userInfoWin = null; }

        // 添加标记
        userMarker = new AMap.Marker({
          position: [lng, lat],
          icon: new AMap.Icon({
            size: new AMap.Size(28, 42),
            image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',
            imageSize: new AMap.Size(28, 42),
            imageOffset: new AMap.Pixel(0, 0)
          }),
          anchor: 'bottom-center',
          zIndex: 110
        });
        map.add(userMarker);

        // Bortle 信息
        const [level, label, color, desc] = estimateBortle(lng, lat);

        // 信息窗口
        userInfoWin = new AMap.InfoWindow({
          content:
            '<div style="color:#ccc;line-height:1.9;">'
            + '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">📍 你的位置</div>'
            + '<div>' + address + '</div>'
            + '<div style="margin-top:6px;">'
            +   '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;'
            +     'background:' + color + ';vertical-align:middle;margin-right:6px;"></span>'
            +   '<strong>Bortle ' + level + ' 级 · ' + label + '</strong>'
            + '</div>'
            + '<div style="font-size:11px;color:#999;margin-top:2px;">' + desc + '</div>'
            + '<div style="font-size:10px;color:#666;margin-top:6px;">'
            +   '💡 地图上暗色区域 = 适合观星 | 亮色区域 = 光污染严重'
            + '</div>'
            + '</div>',
          offset: new AMap.Pixel(0, -48),
          isCustom: true
        });
        userInfoWin.open(map, [lng, lat]);

        updateUI(lng, lat, address);

      } else {
        statusDot.className = 'status-dot error';
        statusText.textContent = '⚠️ 定位失败，请手动查看地图';
        mobLoc.textContent = '定位失败';
        mobCoords.textContent = result && result.message ? result.message : '请检查定位权限';
        mobBortle.textContent = '—';

        if (!silent) {
          console.warn('定位失败:', result);
        }

        // IP 定位兜底
        AMap.plugin('AMap.CitySearch', function() {
          const cs = new AMap.CitySearch();
          cs.getLocalCity(function(csStatus, csResult) {
            if (csStatus === 'complete' && csResult.info === 'OK') {
              statusText.textContent = '📍 IP 定位: ' + csResult.city;
              mobLoc.textContent = csResult.city;
            }
          });
        });
      }
    });
  }

  // ── 在地图上显示搜索结果 ──────────────────────────────
  function showSearchResult(lng, lat, name, address) {
    // 移动地图到目标位置
    map.setZoomAndCenter(13, [lng, lat]);

    // 移除旧搜索标记
    if (searchMarker) { map.remove(searchMarker); searchMarker = null; }
    if (searchInfoWin) { map.remove(searchInfoWin); searchInfoWin = null; }

    // 添加标记
    searchMarker = new AMap.Marker({
      position: [lng, lat],
      icon: new AMap.Icon({
        size: new AMap.Size(30, 38),
        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
        imageSize: new AMap.Size(30, 38),
        imageOffset: new AMap.Pixel(0, 0)
      }),
      anchor: 'bottom-center',
      zIndex: 110
    });
    map.add(searchMarker);

    // Bortle 信息
    const [level, label, color, desc] = estimateBortle(lng, lat);

    searchInfoWin = new AMap.InfoWindow({
      content:
        '<div style="color:#ccc;line-height:1.9;">'
        + '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">' + name + '</div>'
        + '<div style="font-size:11px;color:#999;">' + address + '</div>'
        + '<div style="margin-top:6px;">'
        +   '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;'
        +     'background:' + color + ';vertical-align:middle;margin-right:6px;"></span>'
        +   '<strong>Bortle ' + level + ' 级 · ' + label + '</strong>'
        + '</div>'
        + '<div style="font-size:11px;color:#999;margin-top:2px;">' + desc + '</div>'
        + '</div>',
      offset: new AMap.Pixel(0, -42),
      isCustom: true
    });
    searchInfoWin.open(map, [lng, lat]);

    // 更新 header 状态
    statusDot.className = 'status-dot located';
    statusText.textContent = '🔍 ' + name + ' · Bortle ' + level + ' 级';
    mobLoc.textContent = label + ' · ' + name;
    mobCoords.textContent = lng.toFixed(4) + ', ' + lat.toFixed(4);
    mobBortle.textContent = 'Bortle ' + level;
    mobBortle.style.background = color;
    mobBortle.style.color = level <= 2 ? '#aaccff' : '#fff';
  }

  // ── 初始化搜索 ──────────────────────────────────────────
  function initSearch() {
    // 自动补全
    AMap.plugin('AMap.AutoComplete', function() {
      autoComplete = new AMap.AutoComplete({
        input: 'search-input',
        city: '全国',
        citylimit: false
      });

      autoComplete.on('select', function(e) {
        if (e.poi && e.poi.location) {
          const lng = e.poi.location.lng;
          const lat = e.poi.location.lat;
          const name = e.poi.name;
          const address = e.poi.district + (e.poi.address || '');
          showSearchResult(lng, lat, name, address);
        }
      });
    });

    // 地点搜索（回车触发）
    AMap.plugin('AMap.PlaceSearch', function() {
      placeSearch = new AMap.PlaceSearch({
        pageSize: 5,
        city: '全国',
        citylimit: false,
        extensions: 'base'
      });
    });
  }

  // ── 搜索输入事件 ──────────────────────────────────────
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      searchInput.blur();
      searchInput.value = '';
      searchClear.classList.remove('visible');
      return;
    }
    if (e.key === 'Enter') {
      const keyword = searchInput.value.trim();
      if (!keyword || !placeSearch) return;
      placeSearch.search(keyword, function(status, result) {
        if (status === 'complete' && result.poiList && result.poiList.pois.length > 0) {
          const poi = result.poiList.pois[0];
          if (poi.location) {
            showSearchResult(
              poi.location.lng,
              poi.location.lat,
              poi.name,
              poi.pname + poi.cityname + poi.adname + (poi.address || '')
            );
          }
        } else {
          statusText.textContent = '⚠️ 未找到地点: ' + keyword;
        }
      });
    }
  });

  searchInput.addEventListener('input', function() {
    if (searchInput.value) {
      searchClear.classList.add('visible');
    } else {
      searchClear.classList.remove('visible');
    }
  });

  searchClear.addEventListener('click', function() {
    searchInput.value = '';
    searchClear.classList.remove('visible');
    searchInput.focus();
  });

  // ── 按钮事件 ────────────────────────────────────────────
  btnLayer.addEventListener('click', function() {
    if (layerVisible) {
      lightLayer.hide();
      btnLayer.classList.remove('active');
    } else {
      lightLayer.show();
      btnLayer.classList.add('active');
    }
    layerVisible = !layerVisible;
  });

  btnLocate.addEventListener('click', function() { doLocate(false); });

  btnFullscreen.addEventListener('click', function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen();
    }
  });

  // ── 键盘快捷键 ──────────────────────────────────────────
  document.addEventListener('keydown', function(e) {
    // 不在输入框内时响应
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    switch(e.key.toLowerCase()) {
      case 'l': btnLayer.click(); break;
      case 'f': btnLocate.click(); break;
      case 'f11': e.preventDefault(); btnFullscreen.click(); break;
    }
  });

  // ── 启动 ────────────────────────────────────────────────
  function bootstrap() {
    if (typeof AMap !== 'undefined') {
      initMap();
    } else {
      loadingEl.innerHTML =
        '<div style="color:#e04a4a;font-size:14px;">⚠️ 地图加载失败</div>'
        + '<div style="font-size:11px;color:#999;margin-top:6px;">'
        + '请检查：<br>1. 网络连接<br>2. API Key 是否正确<br>3. 安全密钥是否匹配'
        + '</div>';
      loadingEl.classList.remove('done');
    }
  }

  // AMap 通常通过同步 script 标签加载，但如果未加载完，等待 load 事件
  if (typeof AMap !== 'undefined') {
    bootstrap();
  } else {
    window.addEventListener('load', bootstrap);
  }
})();
</script>
