  const BORTLE_TABLE = [
    { max:0.08, level:1, label:'绝佳暗夜', color:'#010a1a', desc:'极暗 — 银河清晰，深空摄影绝佳' },

    { max:3.00, level:5, label:'郊区天空', color:'#8aaa1a', desc:'偏亮 — 银河不可见，星座可见' },
    { max:8.00, level:6, label:'明亮郊区', color:'#daa000', desc:'亮 — 仅亮星可见' },

    { max:45.0, level:8, label:'城市天空', color:'#b0b0c0', desc:'非常亮 — 仅月亮可见' },
    { max:Infinity, level:9, label:'内城天空', color:'#f0f0f0', desc:'极亮 — 不适合观星' },
  ];

  function radianceToBortle(rad) {
    for (var m of BORTLE_TABLE) { if (rad < m.max) return [m.level,m.label,m.color,m.desc]; }
    return [9,'内城天空','#f0f0f0','极亮'];
  }

  function haversineDist(lng1, lat1, lng2, lat2) {
    var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    var a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  }

  function estimateBortle(lng, lat) {
    // 收集附近 200km 内的城市数据点
    var nearby = [];
    for (var i=0; i<CITY_VIIRS.length; i++) {
      var c = CITY_VIIRS[i];
      var d = haversineDist(lng, lat, c.lng, c.lat);
      if (d <= 200) {
        nearby.push({ rad: c.rad, dist: d });
      }
    }

    // 如果 200km 内有数据点，使用反距离加权
    if (nearby.length > 0) {
      var totalWeight = 0, weightedRad = 0;
      var closestDist = Infinity, closestRad = 0;

      for (var j=0; j<nearby.length; j++) {
        var nb = nearby[j];
        if (nb.dist < closestDist) { closestDist = nb.dist; closestRad = nb.rad; }
        // 使用更陡的衰减曲线，让郊区和城市区分更明显
        var weight = Math.exp(-nb.dist / 15) * nb.rad + 0.01;
        weightedRad += weight;
        totalWeight += Math.exp(-nb.dist / 15);
      }

      var baseRad = totalWeight > 0 ? weightedRad / totalWeight : 0.1;

      // 距离衰减校正：离城市越远，光污染越低
      var decayFactor;
      if (closestDist < 2) {
        decayFactor = 1.0;      // 城市中心
      } else if (closestDist < 8) {
        decayFactor = 0.7;      // 近郊
      } else if (closestDist < 20) {
        decayFactor = 0.4;      // 远郊
      } else if (closestDist < 50) {
        decayFactor = 0.15;     // 偏远郊区/山区
      } else if (closestDist < 100) {
        decayFactor = 0.04;     // 远离城市
      } else {
        decayFactor = 0.01;     // 非常偏远
      }

      var radiance = baseRad * decayFactor;
      return radianceToBortle(radiance);
    }

    // 200km 内无数据点：使用保守低值（可能是无人区）
    return [1, '绝佳暗夜', '#010a1a', '偏远地区 — 极暗，银河清晰'];
  }

  function getBortle(lng, lat, cb) {
    setTimeout(function() { cb(estimateBortle(lng,lat)); }, 0);
  }

  function doLocate() {
    if (!geolocation) return;
    btnLocate.style.opacity='0.5';
    geolocation.getCurrentPosition(function(status, result) {
      btnLocate.style.opacity='1';
      if (status === 'complete') {
        var lng = result.position.lng, lat = result.position.lat;
        var addr = result.formattedAddress || '';
        if (userMarker) { map.remove(userMarker); userMarker=null; }
        if (userInfoWin) { map.remove(userInfoWin); userInfoWin=null; }

        userMarker = new AMap.Marker({
          position:[lng,lat],
          icon: new AMap.Icon({ size:new AMap.Size(28,42), image:'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png', imageSize:new AMap.Size(28,42), imageOffset:new AMap.Pixel(0,0) }),
          anchor:'bottom-center', zIndex:110
        });
        map.add(userMarker);

        getBortle(lng, lat, function(bortle) {
          var level=bortle[0],label=bortle[1],color=bortle[2],desc=bortle[3];
          userInfoWin = new AMap.InfoWindow({
            content: '<div style="color:#ccc;font-size:13px;background:rgba(8,10,18,0.93);padding:14px 16px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.6);line-height:1.9;max-width:280px;pointer-events:none;">'
          + '<div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:4px;">📍 你的位置</div>'
          + '<div style="font-size:12px;color:#999;">'+addr+'</div>'
          + '<div style="margin-top:6px;">'
          +   '<span style="display:inline-block;width:12px;height:12px;border-radius:2px;'
          +     'background:'+color+';vertical-align:middle;margin-right:6px;"></span>'
          +   '<strong>Bortle '+level+' 级 · '+label+'</strong>'
          + '</div>'
          + '<div style="font-size:11px;color:#999;margin-top:2px;">'+desc+'</div>'
          + '</div>',
            offset:new AMap.Pixel(0,-48), isCustom:true
          });
          userInfoWin.open(map,[lng,lat]);
          updateUI(lng, lat, addr, bortle);
        });
      } else {
        statusText.textContent = '⚠️ 定位失败，可手动拖动地图';
        mobLoc.textContent = '定位失败';
        AMap.plugin('AMap.CitySearch', function() {
          new AMap.CitySearch().getLocalCity(function(cs, r) {
            if (cs==='complete' && r.info==='OK') { statusText.textContent='📍 '+r.city; mobLoc.textContent=r.city; }
          });
        });
      }
    });
  }

  function updateUI(lng, lat, addr, bortle) {
    var level=bortle[0],label=bortle[1],color=bortle[2];

    }
  });

  searchInput.addEventListener('input', function() {
    if (searchInput.value) searchClear.classList.add('show');
    else searchClear.classList.remove('show');
  });

  searchClear.addEventListener('click', function() {
    searchInput.value=''; searchClear.classList.remove('show'); searchInput.focus();
  });

  // ---- Mobile responsive ----
  if (window.innerWidth <= 640) {
    document.getElementById('mobile-bar').style.display = 'block';
  }
})();
</script>

</body>
</html>
